<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" role="img" aria-label="Innkeeper — the night audit runs itself: evidence-cited, policy-gated, cryptographically closed">
  <defs>
    <radialGradient id="ibgA" cx="72%" cy="14%" r="55%">
      <stop offset="0" stop-color="#10B981" stop-opacity=".14"/><stop offset="1" stop-color="#10B981" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ibgB" cx="8%" cy="92%" r="50%">
      <stop offset="0" stop-color="#D4A373" stop-opacity=".08"/><stop offset="1" stop-color="#D4A373" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ibrand" gradientUnits="userSpaceOnUse" x1="60" y1="0" x2="960" y2="0">
      <stop offset="0" stop-color="#EFF4F0"/><stop offset=".55" stop-color="#10B981"/><stop offset="1" stop-color="#D4A373"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-260 0;260 0;-260 0" dur="7s" repeatCount="indefinite"/>
    </linearGradient>
    <filter id="iblur14" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="14"/></filter>
    <filter id="iblur3"><feGaussianBlur stdDeviation="3"/></filter>
    <pattern id="igrid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#EFF4F0" stroke-opacity=".05" stroke-width="1"/>
    </pattern>
    <style>
      .disp { font-family: -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
      .mono { font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace; }
    </style>
  </defs>

  <rect width="1280" height="640" fill="#0C0F0D"/>
  <rect width="1280" height="640" fill="url(#ibgA)"><animate attributeName="opacity" values=".7;1;.7" dur="5s" repeatCount="indefinite"/></rect>
  <rect width="1280" height="640" fill="url(#ibgB)"/>
  <g><rect x="-48" y="-48" width="1376" height="736" fill="url(#igrid)"/>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="48 48" dur="5s" repeatCount="indefinite"/></g>

  <!-- NIGHT AUDIT PANEL: clock hits 02:00, rows reconcile, close signs -->
  <g>
    <rect x="620" y="96" width="596" height="168" rx="14" fill="#151A17" stroke="#EFF4F0" stroke-opacity=".1"/>
    <text x="636" y="86" class="mono" font-size="13" letter-spacing="2" fill="#93A29A">NIGHT CLOSE · 2026-07-04 · UNATTENDED</text>
    <!-- clock -->
    <g>
      <circle cx="692" cy="180" r="46" fill="none" stroke="#D4A373" stroke-width="3"/>
      <circle cx="692" cy="180" r="3.5" fill="#D4A373"/>
      <line x1="692" y1="180" x2="692" y2="150" stroke="#EFF4F0" stroke-width="3" stroke-linecap="round">
        <animateTransform attributeName="transform" type="rotate" values="0 692 180;360 692 180" dur="8s" repeatCount="indefinite"/>
      </line>
      <line x1="692" y1="180" x2="712" y2="160" stroke="#D4A373" stroke-width="4" stroke-linecap="round"/>
      <circle cx="692" cy="180" r="46" fill="none" stroke="#10B981" stroke-width="2" opacity="0">
        <animate attributeName="r" values="46;72" dur="8s" begin="0s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values=".6;0" keyTimes="0;.25" dur="8s" repeatCount="indefinite"/>
      </circle>
      <text x="646" y="248" class="mono" font-size="13" fill="#93A29A">02:00 · timer fires</text>
    </g>
    <!-- reconciling rows -->
    <g class="mono" font-size="14">
      <text x="784" y="136" fill="#EFF4F0">m-07 · $189.00 → $183.33</text>
      <g opacity="0"><animate attributeName="opacity" values="0;0;1;1" keyTimes="0;.2;.3;1" dur="8s" repeatCount="indefinite"/>
        <text x="1078" y="136" fill="#10B981">3% OTA ✓</text></g>
      <text x="784" y="172" fill="#EFF4F0">m-12 · $310.00 · no folio</text>
      <g opacity="0"><animate attributeName="opacity" values="0;0;1;1" keyTimes="0;.4;.5;1" dur="8s" repeatCount="indefinite"/>
        <text x="1078" y="172" fill="#D4A373">QUEUE ⚠</text></g>
      <text x="784" y="208" fill="#EFF4F0">11 auto-cleared · 1 queued</text>
      <g opacity="0"><animate attributeName="opacity" values="0;0;1;1" keyTimes="0;.6;.7;1" dur="8s" repeatCount="indefinite"/>
        <text x="1078" y="208" fill="#10B981">0 FALSE ✓</text></g>
      <!-- signed root draws -->
      <g opacity="0"><animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;.72;.8;.97;1" dur="8s" repeatCount="indefinite"/>
        <rect x="812" y="224" width="344" height="28" rx="14" fill="none" stroke="#10B981" stroke-opacity=".7"/>
        <text x="828" y="243" fill="#10B981">merkle root 9f3a…c1 · ed25519 SIGNED</text>
      </g>
    </g>
  </g>

  <!-- kicker -->
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur=".6s" begin=".1s" fill="freeze"/>
    <text x="64" y="92" class="mono" font-size="15" letter-spacing="4" fill="#D4A373">QWEN CLOUD // TRACK 4 · AUTOPILOT AGENT</text>
  </g>

  <!-- title -->
  <g opacity="0" transform="translate(0 26)">
    <animate attributeName="opacity" from="0" to="1" dur=".9s" begin=".25s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" values="0 26;0 0" dur=".9s" begin=".25s" fill="freeze" calcMode="spline" keySplines=".22 1 .36 1" keyTimes="0;1"/>
    <text x="58" y="212" class="disp" font-size="122" font-weight="800" letter-spacing="-3" fill="#10B981" filter="url(#iblur14)" opacity=".5">Innkeeper<animate attributeName="opacity" values=".3;.65;.3" dur="3.4s" repeatCount="indefinite"/></text>
    <text x="58" y="212" class="disp" font-size="122" font-weight="800" letter-spacing="-3" fill="url(#ibrand)">Innkeeper</text>
  </g>

  <!-- tagline -->
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur=".8s" begin=".55s" fill="freeze"/>
    <text x="64" y="262" class="disp" font-size="24" fill="#93A29A">The night audit runs itself — <tspan fill="#EFF4F0" font-weight="600">evidence-cited,</tspan></text>
    <text x="64" y="296" class="disp" font-size="24" fill="#93A29A"><tspan fill="#EFF4F0" font-weight="600">policy-gated,</tspan> and cryptographically closed by 2:04 AM.</text>
  </g>

  <!-- metric -->
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur=".8s" begin=".85s" fill="freeze"/>
    <text x="62" y="386" class="disp" font-size="72" font-weight="800" fill="#10B981" filter="url(#iblur3)" opacity=".55">277/281<animate attributeName="opacity" values=".35;.75;.35" dur="2.6s" repeatCount="indefinite"/></text>
    <text x="62" y="386" class="disp" font-size="72" font-weight="800" fill="#EFF4F0">277/281</text>
    <text x="392" y="360" class="mono" font-size="16" fill="#93A29A">auto-cleared · 30-night month</text>
    <text x="392" y="384" class="mono" font-size="16" fill="#10B981">0 false clears · tested</text>
  </g>

  <!-- features -->
  <g class="disp" font-size="18" fill="#EFF4F0" opacity="0"><animate attributeName="opacity" from="0" to="1" dur=".8s" begin="1.1s" fill="freeze"/>
    <text x="64" y="446"><tspan fill="#10B981">◆</tspan>  Three-way reconciliation: PMS · processor · OTA PDF</text>
    <text x="64" y="480"><tspan fill="#10B981">◆</tspan>  Verdicts cite bounding-box evidence from both books</text>
    <text x="64" y="514"><tspan fill="#10B981">◆</tspan>  Human-in-the-loop gate: E[loss] = amount × (1−conf) ≤ τ</text>
  </g>

  <!-- audit pipeline diagram -->
  <g>
    <path d="M632 400 H1216" stroke="#10B981" stroke-opacity=".28" stroke-width="2" stroke-dasharray="8 7" fill="none">
      <animate attributeName="stroke-dashoffset" values="0;-30" dur="1.1s" repeatCount="indefinite"/>
    </path>
    <circle r="5" fill="#6EE7B7" filter="url(#iblur3)"><animateMotion dur="2.6s" repeatCount="indefinite" path="M632 400 H1216"/></circle>
    <g class="mono" font-size="14" text-anchor="middle">
      <rect x="620" y="374" width="136" height="52" rx="12" fill="#151A17" stroke="#D4A373" stroke-opacity=".6"/>
      <text x="688" y="405" fill="#D4A373">3 SOURCES</text>
      <rect x="780" y="374" width="104" height="52" rx="12" fill="#151A17" stroke="#EFF4F0" stroke-opacity=".22"/>
      <text x="832" y="405" fill="#EFF4F0">MATCH</text>
      <rect x="908" y="374" width="152" height="52" rx="12" fill="#151A17" stroke="#10B981" stroke-opacity=".8"><animate attributeName="stroke-opacity" values=".5;1;.5" dur="2s" repeatCount="indefinite"/></rect>
      <text x="984" y="405" fill="#10B981">E[LOSS] GATE</text>
      <rect x="1084" y="374" width="132" height="52" rx="12" fill="#151A17" stroke="#10B981"/>
      <text x="1150" y="405" fill="#EFF4F0">SIGNED ✓</text>
    </g>
    <g class="mono" font-size="13">
      <rect x="971" y="330" width="245" height="30" rx="15" fill="none" stroke="#93A29A" stroke-opacity=".4" stroke-dasharray="5 5"/>
      <circle cx="991" cy="345" r="4" fill="#D4A373"><animate attributeName="opacity" values="1;.3;1" dur="1.6s" repeatCount="indefinite"/></circle>
      <text x="1007" y="350" fill="#93A29A">human queue · hypotheses</text>
    </g>
  </g>

  <!-- pills -->
  <g class="mono" font-size="13" opacity="0"><animate attributeName="opacity" from="0" to="1" dur=".8s" begin="1.35s" fill="freeze"/>
    <rect x="64" y="574" width="133" height="30" rx="15" fill="#151A17" stroke="#EFF4F0" stroke-opacity=".14"/><circle cx="82" cy="589" r="3.5" fill="#10B981"/><text x="94" y="594" fill="#93A29A">qwen3.7-max</text>
    <rect x="209" y="574" width="149" height="30" rx="15" fill="#151A17" stroke="#EFF4F0" stroke-opacity=".14"/><circle cx="227" cy="589" r="3.5" fill="#10B981"/><text x="239" y="594" fill="#93A29A">qwen3-vl-plus</text>
    <rect x="370" y="574" width="93" height="30" rx="15" fill="#151A17" stroke="#EFF4F0" stroke-opacity=".14"/><circle cx="388" cy="589" r="3.5" fill="#10B981"/><text x="400" y="594" fill="#93A29A">MCP ×3</text>
    <rect x="475" y="574" width="117" height="30" rx="15" fill="#151A17" stroke="#EFF4F0" stroke-opacity=".14"/><circle cx="493" cy="589" r="3.5" fill="#10B981"/><text x="505" y="594" fill="#93A29A">Batch API</text>
    <rect x="604" y="574" width="173" height="30" rx="15" fill="#151A17" stroke="#EFF4F0" stroke-opacity=".14"/><circle cx="622" cy="589" r="3.5" fill="#10B981"/><text x="634" y="594" fill="#93A29A">Alibaba FC timer</text>
    <rect x="789" y="574" width="101" height="30" rx="15" fill="#151A17" stroke="#EFF4F0" stroke-opacity=".14"/><circle cx="807" cy="589" r="3.5" fill="#10B981"/><text x="819" y="594" fill="#93A29A">Ed25519</text>
    <g text-anchor="end"><text x="1216" y="594" fill="#93A29A" opacity=".8">THE INNKEEPERS ARE ASLEEP</text></g>
  </g>

  <!-- sweep -->
  <rect x="-160" y="0" width="120" height="640" fill="#EFF4F0" opacity=".04" transform="skewX(-12)">
    <animate attributeName="x" values="-200;1400" dur="6s" repeatCount="indefinite"/>
  </rect>
</svg>
