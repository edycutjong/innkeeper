# Serverless Devs (s.yaml) — Innkeeper on Alibaba Function Compute 3.0.
#
# MANAGED python3.10 runtime (no container / no ACR / no real-name verification).
# Innkeeper targets 3.12 and uses enum.StrEnum (3.11+); infra/fc/wsgi.py shims it
# before importing the package, so the app runs unchanged on the 3.10 runtime.
#
#   s build --use-docker   # installs requirements.txt deps under code/python
#   s deploy -y            # zips code, creates the fn + anonymous HTTP trigger
#
# Endpoints (anonymous HTTP trigger, all offline / zero keys):
#   GET /verify   re-verify the committed signed-close chain + replay + tamper (I2/I3/I4)
#   GET /run      run one deterministic offline night audit (?night=YYYY-MM-DD)
#   GET /health   liveness

edition: 3.0.0
name: innkeeper-fc
access: default

vars:
  region: ap-southeast-1

resources:
  innkeeper:
    component: fc3
    props:
      region: ${vars.region}
      functionName: innkeeper
      description: "Innkeeper — autopilot night audit for small hotels (Qwen Cloud)"
      runtime: python3.10
      handler: infra.fc.wsgi.handler
      cpu: 0.35
      memorySize: 512
      diskSize: 512
      timeout: 60
      instanceConcurrency: 5
      # code root = the build dir (this file lives in infra/fc/).
      code: ../../
      environmentVariables:
        # s build installs requirements.txt deps under /code/python
        PYTHONPATH: /code/python
      triggers:
        - triggerName: http
          triggerType: http
          triggerConfig:
            authType: anonymous
            methods:
              - GET
              - POST
