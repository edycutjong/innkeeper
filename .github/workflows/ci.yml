name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same PR/branch
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ── STAGE 1: Code Quality (parallel with Stage 2) ─────────
  quality:
    name: "Stage 1 · Quality"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Full matrix on main push, single version on PRs (saves CI minutes)
        python-version: ${{ github.event_name == 'push' && fromJSON('["3.12", "3.13"]') || fromJSON('["3.12"]') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check .
      - name: Type check (mypy)
        run: mypy src
        continue-on-error: true # openai SDK stubs on the optional --live path aren't fully typed
      - name: Unit tests with coverage
        run: pytest --cov=innkeeper_audit --cov-report=xml --cov-report=term
      - name: Upload coverage report
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml
          retention-days: 7

  # ── STAGE 2: Security Gate (parallel with Stage 1) ────────
  secret-scan:
    name: "Stage 2 · Secret Scanning"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history for scanning git commits
      - name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

  dependency-audit:
    name: "Stage 2 · Dependency Audit"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies
        run: pip install -e ".[live,dev]"
      - name: pip-audit
        run: |
          pip install pip-audit
          pip-audit
        continue-on-error: true # Advisory — don't block on unpatched upstream
      - name: License compliance check
        run: |
          pip install pip-licenses
          pip-licenses --fail-on="GPL-3.0;AGPL-3.0"
        continue-on-error: true

  # ── STAGE 3: Build Verification ───────────────────────────
  build:
    name: "Stage 3 · Build Verification"
    needs: [quality]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Build sdist + wheel
        run: |
          pip install build
          python -m build
      - name: Verify the CLI entrypoint resolves
        run: |
          pip install dist/*.whl
          innkeeper --help

  # ── STAGE 4: Offline Proof (seed → run → replay → verify-chain) ──
  offline-proof:
    name: "Stage 4 · Offline Proof"
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Seed a deterministic month
        run: innkeeper seed --nights 30
      - name: Run a night, replay it, verify the signed chain
        run: |
          innkeeper run --night 2026-07-01
          innkeeper run --night 2026-07-02
          innkeeper run --night 2026-07-03
          innkeeper run --night 2026-07-04
          innkeeper replay --night 2026-07-04
          innkeeper verify-chain
      - name: Offline tamper-detection proof (socket-guarded)
        run: python scripts/verify_offline.py
      - name: Benchmark (zero false auto-clears is the gate)
        run: innkeeper bench

  # ── STAGE 5: Deploy Gate (main only) ──────────────────────
  deploy-gate:
    name: "Stage 5 · Deploy Gate"
    needs: [build, offline-proof, secret-scan, dependency-audit]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: All gates passed
        run: |
          echo "All CI/CD gates passed!"
          echo ""
          echo "Pipeline Summary:"
          echo "  - Stage 1 - Quality (ruff, mypy, pytest --cov)"
          echo "  - Stage 2 - Secret Scanning (TruffleHog)"
          echo "  - Stage 2 - Dependency Audit (pip-audit)"
          echo "  - Stage 3 - Build Verification (sdist/wheel + CLI smoke)"
          echo "  - Stage 4 - Offline Proof (seed/run/replay/verify-chain/bench)"
